<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soja Tech | Agrinho 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="hero">
            <h1>Agro Forte: Missão Soja</h1>
            <p>Produzir com inteligência, preservar com tecnologia.</p>
        </div>
    </header>

    <main class="container">
        <section class="game-area">
            <div class="stats">
                <div>Sustentabilidade: <span id="score">0</span></div>
                <div>Tempo: <span id="timer">30</span>s</div>
            </div>
            
            <div id="campo">
                <button id="start-btn">INICIAR OPERAÇÃO SOJA</button>
            </div>
        </section>

        <section class="cards">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1594904351111-a072f80b1a71?auto=format&fit=crop&w=500&q=80" alt="Soja">
                <h3>O Ouro Verde</h3>
                <p>A soja é a base da nossa economia sustentável.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
